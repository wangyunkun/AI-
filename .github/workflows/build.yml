name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 顺手修复 urllib3 的红字警告
          pip install urllib3==1.26.15 requests==2.31.0
          pip install -r requirements.txt

      - name: Setup Java (Required for Android SDK)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configure Flutter (Fix Linux Toolchain Error)
        run: |
          # 🚨 关键修复：直接禁用掉 Linux 和 Web 的检查，防止 Flet 误杀！
          flutter config --no-enable-linux-desktop
          flutter config --no-enable-web
          flutter config --no-enable-macos-desktop
          flutter config --no-enable-windows-desktop
          
          # 自动同意安卓协议
          yes | flutter doctor --android-licenses
          
          # 运行一次 doctor 确认全绿
          flutter doctor

      - name: Build APK with Flet
        run: flet build apk .

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QualityCheckApp-Android
          path: build/apk/**/*.apk
