name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3 chardet charset_normalizer --upgrade
          pip install -r requirements.txt

      - name: Setup Java (Required for Android SDK)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 这行极其关键，全自动同意所有安卓霸王条款
      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      # 编译 APK 命令
      - name: Build APK with Flet
        run: flet build apk --project-name "QualityCheckApp" --project-version "4.6.0"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QualityCheckApp-Android
          path: build/apk/**/*.apk
