name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  FLUTTER_VERSION: "3.27.4"    # 必须与 flet 0.27.x 配套
  FLET_CLI_NO_RICH_OUTPUT: 1
  PYTHONUTF8: 1

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 配置 Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 配置 Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 安装 flet CLI
        run: |
          python -m pip install --upgrade pip
          pip install "flet==0.27.6"

      - name: 验证 flet 版本
        run: flet --version

      - name: 关闭 Flutter 统计
        run: flutter config --no-analytics

      - name: 构建 APK
        run: |
          flet build apk \
            --project "安全质检助手" \
            --org com.yourcompany \
            --build-number ${{ github.run_number }} \
            --build-version 1.0.${{ github.run_number }}

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: apk-release-${{ github.run_number }}
          path: build/apk/*.apk
          retention-days: 30
