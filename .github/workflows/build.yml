name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"        # ⚠️ 必须用 3.11，不能用 3.12
  FLUTTER_VERSION: "3.24.3"     # ✅ 与 flet 0.25.x 经验证可用的配对
  PYTHONUTF8: 1

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 配置 Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'      # flet 0.25.x 推荐 JDK 17

      - name: 配置 Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 升级 pip 并修复 requests 冲突
        run: |
          python -m pip install --upgrade pip
          pip install "urllib3<2" "charset-normalizer<3"
          pip install "flet==0.25.0"

      - name: 接受 Android 许可证
        run: |
          yes | flutter doctor --android-licenses || true

      - name: 验证环境
        run: |
          flet --version
          flutter --version
          java -version

      - name: 关闭 Flutter 统计
        run: flutter config --no-analytics

      - name: 构建 APK
        run: |
          flet build apk \
            --project "安全质检助手" \
            --org com.yourcompany \
            --build-number ${{ github.run_number }} \
            --build-version 1.0.${{ github.run_number }}

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-release-${{ github.run_number }}
          path: build/apk/*.apk
          retention-days: 30
