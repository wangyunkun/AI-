name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 修复 urllib3 的依赖警告
          pip install requests urllib3 chardet charset_normalizer --upgrade
          pip install -r requirements.txt

      - name: Setup Java (Required for Android SDK)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 关键修复：全自动同意安卓 SDK 的所有协议！
      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Build APK with Flet
        run: flet build apk . --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QualityCheckApp-Android
          path: build/apk/**/*.apk
