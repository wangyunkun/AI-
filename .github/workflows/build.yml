name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3 chardet charset_normalizer --upgrade
          pip install -r requirements.txt

      - name: Setup Java (Required for Android SDK)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configure Flutter (Trick the Doctor)
        run: |
          # 🚨 绝妙修复：禁用电脑桌面端，但故意保留 Web！
          # 这样 Flutter 就会把云端自带的 Chrome 当作"已连接设备"，完美骗过检查！
          flutter config --no-enable-linux-desktop
          flutter config --no-enable-macos-desktop
          flutter config --no-enable-windows-desktop
          
          # 自动同意安卓霸王协议
          yes | flutter doctor --android-licenses
          
          # 打印一次体检报告，此时必定全绿！
          flutter doctor

      - name: Build APK with Flet
        run: flet build apk .

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QualityCheckApp-Android
          path: build/apk/**/*.apk
